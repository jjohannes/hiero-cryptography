# SPDX-License-Identifier: Apache-2.0
name: Build

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  packages: write
  contents: read
  issues: read
  checks: write
  pull-requests: write
  actions: read
  statuses: write

env:
  LC_ALL: C.UTF-8
  GRADLE_CACHE_USERNAME: ${{ secrets.GRADLE_CACHE_USERNAME }}
  GRADLE_CACHE_PASSWORD: ${{ secrets.GRADLE_CACHE_PASSWORD }}
  CG_EXEC: ionice -c 2 -n 2 nice -n 19

jobs:
  read-build-targets:
    name: Read Build Targets
    uses: ./.github/workflows/855-call-extract-targets-and-libs.yaml
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build_rust_macos:
    # Build macOS Rust targets separately on a macOS runner to have access to macOS SDKs
    name: Build Rust - macOS
    needs:
      - read-build-targets
    runs-on: macos-14
    env:
      HIERO_NATIVE_TARGETS: ${{ needs.read-build-targets.outputs.hiero-native-targets }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.24.2"

      - name: Setup Java
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
        with:
          distribution: temurin
          java-version: 25.0.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
        with:
          cache-read-only: false

      - name: Setup auto-tools/libtool for native builds
        run: |
          brew install automake libtool

      - name: Build Native Darwin
        run: ./gradlew cargoBuildX86Darwin cargoBuildAarch64Darwin buildLibsodiumDarwinArm64 buildLibsodiumDarwinAmd64 buildSecp256k1DarwinArm64 buildSecp256k1DarwinAmd64

  build_rust_linux_windows:
    name: Build Rust - Linux / Windows
    needs: read-build-targets
    runs-on: hl-crypto-lin-md
    env:
      HIERO_NATIVE_TARGETS: ${{ needs.read-build-targets.outputs.hiero-native-targets }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.24.2"

      - name: Setup Java
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
        with:
          distribution: temurin
          java-version: 25.0.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
        with:
          cache-read-only: false

      - name: Setup clang-tools (Windows cross-compile)
        # Make sure 'clang-cl' and 'llvm-lib' are installed for compiling crates with C++ code for Windows
        # https://github.com/hiero-ledger/hiero-gradle-conventions/issues/97
        # Also install g++-aarch64-linux-gnu because the compressor build via Rust/Go needs it.
        # Finally, install mingw that we use to build for Windows target.
        run: |
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 15CF4D18AF4F7421
          sudo add-apt-repository deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main
          sudo apt-get update
          sudo apt-get -y install clang-tools-19
          sudo ln -s /usr/bin/clang-cl-19 /usr/bin/clang-cl
          sudo ln -s /usr/bin/llvm-lib-19 /usr/bin/llvm-lib
          clang-cl -v
          llvm-lib -v
          sudo apt-get -y install g++-aarch64-linux-gnu
          sudo apt-get -y install binutils-aarch64-linux-gnu
          sudo apt-get -y install mingw-w64
          sudo apt-get -y install autoconf automake libtool libtool-bin

      - name: Build Native Linux / Windows
        run: ./gradlew cargoBuildX86Linux cargoBuildAarch64Linux cargoBuildX86Windows buildLibsodiumLinuxAmd64 buildLibsodiumLinuxArm64  buildLibsodiumWindowsAmd64 buildSecp256k1LinuxAmd64 buildSecp256k1LinuxArm64  buildSecp256k1WindowsAmd64

  build:
    name: Build TSS Crypto Library
    needs:
      - read-build-targets
      - build_rust_macos
      - build_rust_linux_windows
    runs-on: hl-crypto-lin-lg
    env:
      HIERO_NATIVE_TARGETS: ${{ needs.read-build-targets.outputs.hiero-native-targets }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
        with:
          distribution: temurin
          java-version: 25.0.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
        with:
          cache-read-only: false

      - name: Build software
        run: ./gradlew -PskipInstallRustToolchains=true assemble

      - name: Code Quality Checks
        run: ./gradlew -PskipInstallRustToolchains=true qualityCheck --continue

      - name: Gradle Unit Test
        run: ${CG_EXEC} ./gradlew -PskipInstallRustToolchains=true test :aggregation:testCodeCoverageReport --continue

      - name: Publish Unit Test Results
        uses: step-security/publish-unit-test-result-action@914f0f642c242f38335a491805adfc9bd64b1cbb # v2.21.1
        with:
          files: "**/build/test-results/test/TEST-*.xml"

  test-cross-platform:
    name: Test on ${{ matrix.os }}
    needs:
      - read-build-targets
      - build
    strategy:
      matrix:
        # removed windows from test as the windows build does not complete due to size of runner (2c/7gb RAM)
        os: [macos-14]
    runs-on: ${{ matrix.os }}
    env:
      HIERO_NATIVE_TARGETS: ${{ needs.read-build-targets.outputs.hiero-native-targets }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Standardize Git Line Endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
        with:
          distribution: temurin
          java-version: 25.0.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
        with:
          cache-read-only: false

      - name: Gradle Unit Test
        # We do -PskipInstallRustToolchains=true, because all cargoBuild task results are taken FROM-CACHE
        run: ./gradlew test -PskipInstallRustToolchains=true --continue

  analyze:
    name: Analyze
    uses: ./.github/workflows/zxc-code-analysis.yaml
    needs:
      - build
      - test-cross-platform
    if: ${{ (github.event_name == 'push') && !failure() && !cancelled() }}
    with:
      custom-job-label: Source Code
      enable-snyk-scan: true
      snyk-org-identifier: hedera-services
    secrets:
      snyk-token: ${{ secrets.SNYK_TOKEN }}
